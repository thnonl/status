name: status-dashboard

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3000}
      HOSTNAME: 0.0.0.0
      MONGODB_URI: ${MONGODB_URI:?MONGODB_URI is required}
      CHECK_INTERVAL_MINUTES: ${CHECK_INTERVAL_MINUTES:-30}
      RETENTION_DAYS: ${RETENTION_DAYS:-7}
      NEXT_TELEMETRY_DISABLED: ${NEXT_TELEMETRY_DISABLED:-1}
      SCREENSHOT_QUALITY: ${SCREENSHOT_QUALITY:-70}
    ports:
      - "${APP_PORT:-3000}:3000"
